<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
    <link rel="stylesheet" href="{{ "css/style.css" | absURL }}">
</head>
<body>
    <header>
        <nav>
            <a href="{{ "/" | absURL }}" class="site-title">{{ .Site.Title }}</a>
            <div class="nav-links">
                <a href="{{ "/" | absURL }}">Accueil</a>
                <a href="{{ "/poemes/" | absURL }}">Tous les poemes</a>
                <a href="{{ "/tags/" | absURL }}">Par theme</a>
            </div>
        </nav>
    </header>
    <main>{{ block "main" . }}{{ end }}</main>
    <footer>
        <p>© {{ now.Year }} {{ .Site.Params.author }} - Tous droits reserves</p>
    </footer>
</body>
</html>
